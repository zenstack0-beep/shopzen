        humanist: {fd:"'Nunito Sans',sans-serif",   fb:"'Mulish',sans-serif",        u:'https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap'}
      };

      function applySettings(s) {
        var tk=(s&&s.theme)||'default';
        var t=T[tk]||T['default'];
        var isDark=!!(s&&s.darkMode);
        var pr=(s&&s.primaryColor)||t.p;
        var pd=(s&&s.primaryDarkColor)||t.pd;
        var pl=(s&&s.primaryLightColor)||t.pl;
        var ac=(s&&s.secondaryColor)||t.a;
        var dk=(s&&s.darkBgColor)||t.d;
        var cardBg=isDark?(t.dcb||'#1a1a2e'):t.cb;
        var bodyBg=isDark?(t.dbb||'#0d0d1a'):t.bb;
        var textPrimary=isDark?'#f1f5f9':'#0f172a';
        var textSecondary=isDark?'#94a3b8':'#64748b';
        var borderColor=isDark?'#1e293b':'#e5e7eb';
        var r=document.documentElement;
        r.style.setProperty('--color-primary',       pr);
        r.style.setProperty('--color-primary-dark',  pd);
        r.style.setProperty('--color-primary-light', pl);
        r.style.setProperty('--color-accent',        ac);
        r.style.setProperty('--color-dark',          dk);
        r.style.setProperty('--color-surface',       t.s);
        r.style.setProperty('--theme-gradient',      t.g);
        r.style.setProperty('--hero-gradient',       t.hg);
        r.style.setProperty('--card-bg',             cardBg);
        r.style.setProperty('--body-bg',             bodyBg);
        r.style.setProperty('--glow-primary',        pr+'66');
        r.style.setProperty('--glow-accent',         ac+'4d');
        r.style.setProperty('--text-primary',        textPrimary);
        r.style.setProperty('--text-secondary',      textSecondary);
        r.style.setProperty('--border-color',        borderColor);
        var bs=document.getElementById('theme-bootstrap-bg');
        if(!bs){bs=document.createElement('style');bs.id='theme-bootstrap-bg';document.head.appendChild(bs);}
        bs.textContent='html,body{background:'+bodyBg+' !important;color:'+textPrimary+'}';
        if(isDark) r.classList.add('dark-mode'); else r.classList.remove('dark-mode');
        var fk=(s&&s.fontStyle)||'default';
        var f=F[fk]||F['default'];
        r.style.setProperty('--font-display',f.fd);
        r.style.setProperty('--font-body',f.fb);
        var fl=document.getElementById('theme-font');
        if(!fl){fl=document.createElement('link');fl.id='theme-font';fl.rel='stylesheet';document.head.appendChild(fl);}
        if(fl.href!==f.u) fl.href=f.u;
        if(s&&s.customCSS){
          var cs=document.getElementById('theme-custom-css');
          if(!cs){cs=document.createElement('style');cs.id='theme-custom-css';document.head.appendChild(cs);}
          cs.textContent=s.customCSS;
        }
        var mt=document.getElementById('meta-theme-color');
        if(mt) mt.content=pr;
        /* Update spinner colour to match theme */
        var sp=document.getElementById('szl-spinner');
        if(sp) sp.style.borderTopColor=pr;
        var sl=document.getElementById('szl-logo-dot');
        if(sl) sl.style.background=pr;
      }

      /* 1. Apply from localStorage immediately (returning visitors) */
      var cached=null;
      try{var raw=localStorage.getItem('shopzen_theme_v2');if(raw)cached=JSON.parse(raw);}catch(e){}
      applySettings(cached);

      /* 2. Fetch theme from API for new devices, update everything before loader hides */
      var apiBase = '';
      /* Injected at build time by CRA — falls back to same-origin /api */
      try {
        /* window.SHOPZEN_API_URL can be set in a separate <script> before this one
           if you need runtime configuration without a rebuild */
        if(window.SHOPZEN_API_URL) apiBase = window.SHOPZEN_API_URL;
      } catch(e){}

      window.__szThemeReady = false;
      var fetchDone = false;

      function markReady(){
        fetchDone = true;
        /* If React already mounted, hide immediately */
        if(window.__szReactMounted) hideSplash();
      }

      fetch(apiBase+'/api/settings')
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if(data && typeof data==='object' && !Array.isArray(data)){
            applySettings(data);
            try{ localStorage.setItem('shopzen_theme_v2', JSON.stringify(data)); }catch(e){}
          }
          markReady();
        })
        .catch(function(){ markReady(); });

      /* Safety net: hide after 3 s no matter what */
      setTimeout(function(){ markReady(); }, 3000);

      window.__szFetchDone = function(){ return fetchDone; };
    })();
    </script>

    <style>
      /* ── Splash / loading screen ── */
      #szl-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: var(--body-bg, #fafaf8);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #szl-splash.szl-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #szl-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--color-primary, #b5451b);
        letter-spacing: -0.5px;
        user-select: none;
      }
      #szl-logo-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--color-primary, #b5451b);
        display: inline-block;
        margin-bottom: 2px;
      }
      #szl-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(0,0,0,0.08);
        border-top-color: var(--color-primary, #b5451b);
        border-radius: 50%;
        animation: szl-spin 0.75s linear infinite;
      }
      @keyframes szl-spin {
        to { transform: rotate(360deg); }
      }
      /* dark mode for splash */
      html.dark-mode #szl-splash {
        background: var(--body-bg, #0f0f0f);
      }
      html.dark-mode #szl-spinner {
        border-color: rgba(255,255,255,0.08);
        border-top-color: var(--color-primary, #b5451b);
      }
      html.dark-mode #szl-logo {
        color: var(--color-primary, #b5451b);
      }
    </style>

  <body>
    <!-- Splash screen — hidden once theme is fetched AND React has mounted -->
    <div id="szl-splash">
      <div id="szl-logo">
        ShopZen<span id="szl-logo-dot"></span>
      </div>
      <div id="szl-spinner"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      /* Called by ThemeContext (or App) once React has fully mounted.
         Add  window.__szReactMounted = true; window.hideSplash && window.hideSplash();
         to the end of ThemeProvider's first useEffect, OR rely on the
         MutationObserver below which detects when #root gets children. */
      window.hideSplash = function(){
        var el = document.getElementById('szl-splash');
        if(el) el.classList.add('szl-hide');
      };

      /* Auto-detect React mount via MutationObserver — no changes to React code needed */
      (function(){
        var root = document.getElementById('root');
        if(!root) return;
        var obs = new MutationObserver(function(){
          if(root.children.length > 0){
            obs.disconnect();
            window.__szReactMounted = true;
            /* Wait for API fetch to finish too — if already done, hide now */
            if(window.__szFetchDone && window.__szFetchDone()){
              window.hideSplash();
            }
            /* Otherwise the fetch callback will call hideSplash when it finishes */
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>
  </body>
